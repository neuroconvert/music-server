services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      - ND_LOGLEVEL=info
      - ND_SCANSCHEDULE=1h
      - ND_SESSIONTIMEOUT=24h
      - ND_DEFAULTTHEME=Dark
      - ND_ENABLECOVERANIMATION=true
    volumes:
      - ./data:/data
      - ./music:/music:ro

  music-processor:
    build: .
    container_name: music-processor
    restart: unless-stopped
    volumes:
      - ./config:/config
      - ./inbox:/inbox
      - ./staging:/staging
      - ./music:/music
      - ./scripts:/scripts
      - ./logs:/logs
      - ./test:/test
      
  music-uploader:
    build: .
    container_name: music-uploader
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - UPLOAD_USER=${UPLOAD_USER}
      - UPLOAD_PASS=${UPLOAD_PASS}
    volumes:
      - ./inbox:/inbox
      - ./upload_drafts:/upload_drafts
      - ./scripts:/scripts
      - ./logs:/logs
    command: ["python", "/scripts/uploader.py"]
    